services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-inventory}:${POSTGRES_PASSWORD:-inventory}@db:5432/${POSTGRES_DB:-inventory}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost"]'
      NESSUS_URL: ${NESSUS_URL:-https://nessus:8834}
      NESSUS_ACCESS_KEY: ${NESSUS_ACCESS_KEY:-}
      NESSUS_SECRET_KEY: ${NESSUS_SECRET_KEY:-}
      NESSUS_VERIFY_SSL: ${NESSUS_VERIFY_SSL:-false}
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-inventory}:${POSTGRES_PASSWORD:-inventory}@db:5432/${POSTGRES_DB:-inventory}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app

  nessus:
    image: tenableofficial/nessus
    restart: unless-stopped
    environment:
      ACTIVATION_CODE: ${NESSUS_ACTIVATION_CODE:-}
      USERNAME: ${NESSUS_ADMIN_USER:-admin}
      PASSWORD: ${NESSUS_ADMIN_PASS:-admin1234!}
    ports:
      - "8834:8834"
    volumes:
      - nessusdata:/opt/nessus/var/nessus

  web:
    build:
      context: .
      dockerfile: docker/web.dev.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  nessusdata:
